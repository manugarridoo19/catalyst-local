name: refresh-news

# Cron unificado cada 15min. Una sola invocación que ejecuta ingest +
# scoring en la misma function para minimizar cold starts en Vercel
# Hobby Fluid CPU. Sin retry: un 5xx puntual es preferible a duplicar
# la factura — el siguiente tick recupera el slack.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit cron tick endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: "https://catalyst-local.vercel.app/api/cron/tick"
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret missing"
            exit 1
          fi
          response=$(curl -sS --max-time 90 -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$ENDPOINT")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body" | head -c 1000
          if [ "$code" != "200" ]; then exit 1; fi
