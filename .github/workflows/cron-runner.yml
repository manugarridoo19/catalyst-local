name: cron-runner

# Catalyst cron corre en el propio runner de GitHub Actions: fetch RSS +
# Finnhub + Marketaux + Google News, normaliza, categoriza, inserta en
# Neon, scorea con Groq/OpenRouter y emite a Pusher. Vercel NO se invoca
# en el path del cron — su CPU solo se consume cuando un usuario abre la
# UI (SSR + /api/feed + /api/quotes etc.).
#
# Repo publico => minutos GH Actions ilimitados => cadencia 5min restaurada.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: cron-runner
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # 10min: el tick creció (6 fuentes + brief/picks + reintentos de keys en
    # daily cap) y ORPHAN_BATCH=120 añade ~6 llamadas LLM más. Con 3min
    # GitHub cancelaba el job en plena fase de scoring (2026-07-17: 4 runs
    # seguidos cancelled → mañana entera sin puntuar, y en silencio).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run cron tick
        env:
          # GitHub throttlea el schedule de repos públicos a cadencia real
          # 1-4h: este cron es TODA la capacidad de scoring cuando el Mac
          # duerme. 120/tick (12 llamadas batch) compensa la cadencia; el
          # scorer local de cada 15min mantiene su default de 60.
          ORPHAN_BATCH: "120"
          # Signal Lab — job de outcomes. Corre UNA vez al día (guard global
          # en lib/signals/outcomes.ts), no en cada tick: un cierre de ayer da
          # el mismo número a las 04:00 que a las 23:00.
          # Yahoo devuelve 429 a TODO chart también desde los runners de
          # GitHub (verificado 2026-07-21), así que el fallback FMP es hoy la
          # vía real. Con 1 pasada/día el techo es 40 símbolos + SPY = 41
          # llamadas contra la cuota free de 250/día que comparte con los
          # fundamentales. Si Yahoo vuelve, este gasto cae solo a ~0.
          OUTCOMES_MAX_SYMBOLS: "40"
          # Yahoo limita por IP y el reparto es asimétrico: 429 desde este
          # runner, pero responde normal desde nuestro Worker de Cloudflare.
          # El proxy convierte el bloqueo en una llamada más — gratis y sin
          # key nueva — y deja el fallback FMP (cuota 250/día) como 3ª opción.
          LAB_PRICE_PROXY_URL: "https://catalyst-local.manubisbal19.workers.dev"
          LAB_FMP_MAX_CALLS: "45"
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # Yahoo Finance responde headers >16KB (CSP+cookies) y undici los
          # rechaza con UND_ERR_HEADERS_OVERFLOW — sin esto la extracción de
          # artículos (pre-enrich impact>=4) falla para rss:yahoo-finance.
          NODE_OPTIONS: "--max-http-header-size=65536"
          # Marketaux free = 100 req/día. El pinger dispara workflow_dispatch
          # cada 10min (144 ticks/día) y reventó el cap el primer día
          # (2026-07-18). Solo el schedule (throttled por GitHub a 1-4h,
          # la cadencia original pre-pinger) trae Marketaux.
          SKIP_MARKETAUX: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          # Comma-separated pool of OpenRouter keys (multi-account) read by
          # lib/providers/openrouter.ts. Rotates on free-models-per-day 429s.
          # Falls back to OPENROUTER_API_KEY when this secret is empty.
          OPENROUTER_API_KEYS: ${{ secrets.OPENROUTER_API_KEYS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Pool de Google AI Studio (gemini flash-lite) — colchón cuando el
          # pool de OpenRouter agota su free-models-per-day. Round-robin en
          # lib/providers/gemini.ts. RESERVE = cuenta principal blindada,
          # solo se usa si las primarias están agotadas.
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_RESERVE_API_KEYS: ${{ secrets.GEMINI_RESERVE_API_KEYS }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          PUSHER_APP_ID: ${{ secrets.PUSHER_APP_ID }}
          PUSHER_KEY: ${{ secrets.PUSHER_KEY }}
          PUSHER_SECRET: ${{ secrets.PUSHER_SECRET }}
          PUSHER_CLUSTER: ${{ secrets.PUSHER_CLUSTER }}
        run: pnpm cron:remote
