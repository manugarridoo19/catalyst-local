name: health-check

# Corre cada 15 min — chequea que el cron de news esté sano y abre un
# issue en GitHub si detecta:
#   1. La news más reciente tiene >30 min ("cron muerto" — ingest parado)
#   2. Los 3 últimos runs de refresh-news.yml fallaron seguidos
# Usa títulos estables para los issues, así si ya existe uno abierto solo
# añade un comment en vez de duplicar.
# Seguridad: solo usa github.token (trusted) y outputs propios via env.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Fetch health
        id: health
        env:
          ENDPOINT: "https://catalyst-local.vercel.app/api/health"
        run: |
          body=$(curl -sS --max-time 20 "$ENDPOINT")
          echo "raw=$body"
          age=$(echo "$body" | jq -r '.publishedAgeMin // .insertedAgeMin // -1')
          inserted_h=$(echo "$body" | jq -r '.insertedLastHour // 0')
          unscored=$(echo "$body" | jq -r '.unscoredWithTickers // 0')
          ok=$(echo "$body" | jq -r '.ok // false')
          {
            echo "age=$age"
            echo "inserted_h=$inserted_h"
            echo "unscored=$unscored"
            echo "ok=$ok"
          } >> "$GITHUB_OUTPUT"

      - name: Check recent cron runs
        id: runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          recent=$(gh run list --workflow refresh-news.yml -L 3 \
            --json conclusion --jq '[.[].conclusion] | join(",")')
          echo "recent=$recent"
          fails=$(echo "$recent" | tr ',' '\n' | head -n 3 | grep -c "^failure$" || true)
          {
            echo "recent=$recent"
            echo "fails=$fails"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update alert issue
        env:
          GH_TOKEN: ${{ github.token }}
          AGE: ${{ steps.health.outputs.age }}
          INSERTED_H: ${{ steps.health.outputs.inserted_h }}
          UNSCORED: ${{ steps.health.outputs.unscored }}
          HEALTH_OK: ${{ steps.health.outputs.ok }}
          RECENT: ${{ steps.runs.outputs.recent }}
          FAILS: ${{ steps.runs.outputs.fails }}
        run: |
          set -e
          reason=""
          # insertedLastHour=0 es la señal real de cron muerto: en 12 ticks
          # (5min × 12) NO entró NADA. publishedAgeMin alto solo significa
          # que los RSS no actualizaron en X min, no que nuestro cron falle.
          if [ "$HEALTH_OK" != "true" ]; then
            reason="health endpoint not OK"
          elif [ "$INSERTED_H" = "0" ]; then
            reason="zero inserts in the last hour (cron likely dead)"
          elif [ "$FAILS" -ge 3 ] 2>/dev/null; then
            reason="last 3 refresh-news runs failed: ${RECENT}"
          fi

          if [ -z "$reason" ]; then
            echo "All healthy: age=${AGE}min inserted_lasthour=${INSERTED_H} unscored=${UNSCORED} runs=${RECENT}"
            open=$(gh issue list --label cron-health --state open --json number --jq '.[0].number // empty')
            if [ -n "$open" ]; then
              gh issue comment "$open" --body "Auto-resolved: cron back to healthy (age=${AGE}min, inserted_lasthour=${INSERTED_H}, runs=${RECENT})."
              gh issue close "$open" --reason completed
            fi
            exit 0
          fi

          title="[cron-health] ${reason}"
          body=$(printf '%s\n' \
            "Detected at $(date -u +%FT%TZ)" \
            "" \
            "- publishedAgeMin: ${AGE}" \
            "- insertedLastHour: ${INSERTED_H}" \
            "- unscoredWithTickers: ${UNSCORED}" \
            "- recent refresh-news runs: ${RECENT}" \
            "" \
            "Trigger: ${reason}" \
            "" \
            "Endpoint: https://catalyst-local.vercel.app/api/health")

          open=$(gh issue list --label cron-health --state open --json number --jq '.[0].number // empty')
          if [ -n "$open" ]; then
            echo "Updating existing issue #${open}"
            gh issue comment "$open" --body "$body"
          else
            echo "Opening new alert issue"
            gh issue create --title "$title" --label cron-health --body "$body"
          fi
